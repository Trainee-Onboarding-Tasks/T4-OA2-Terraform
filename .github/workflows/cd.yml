name: "Infrastructure: CD (Terraform)"

on:
  push:
    branches: [ "main" ]
    paths: [ "iac/**" ]

  pull_request:
    branches: [ "main" ]
    paths: [ "iac/**" ]

permissions:
  id-token: write 
  contents: read  


jobs:

  plan:

    name: "Terraform: Init & Plan"
    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./iac

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "AWS Auth (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::971778147356:role/GitHubActionsTerraformRole
          aws-region: us-east-1

      - name: "Terraform: Init"
        run: terraform init

      - name: "Terraform: Validate"
        run: terraform validate

      - name: "Terraform: Plan"
        run: terraform plan


  apply:

    name: "Terraform: Apply"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest
    environment: T4-deploy

    defaults:
      run:
        working-directory: ./iac

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "AWS Auth (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::971778147356:role/GitHubActionsTerraformRole
          aws-region: us-east-1

      - name: "Terraform: Init"
        run: terraform init

      - name: "Terraform: Apply"
        run: terraform apply -auto-approve
